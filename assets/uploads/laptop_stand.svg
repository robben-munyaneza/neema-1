<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#311042" />
      <stop offset="100%" stop-color="#090514" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="15" fill="url(#cyberGrad)" />
  
  <!-- Stand Structure -->
  <path d="M 120 220 L 280 220 L 260 140 L 140 140 Z" fill="none" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)" />
  <path d="M 100 130 L 300 130 L 280 110 L 120 110 Z" fill="#25184a" stroke="#a855f7" stroke-width="2" />
  
  <!-- Laptop Outline (Isometric / Stylized) -->
  <path d="M 140 110 L 260 110 L 290 60 L 110 60 Z" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.8" />
  <line x1="120" y1="220" x2="100" y2="240" stroke="#ec4899" stroke-width="4" stroke-linecap="round" />
  <line x1="280" y1="220" x2="300" y2="240" stroke="#ec4899" stroke-width="4" stroke-linecap="round" />
  
  <!-- Cool text tag -->
  <text x="200" y="270" fill="#a5b4fc" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle" letter-spacing="2">NEON DOCK PRO</text>
</svg>
