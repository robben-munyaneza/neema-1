<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#020617" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="15" fill="url(#cyberGrad)" />
  
  <!-- Hoodie Shape representation -->
  <!-- Body -->
  <path d="M 130 100 L 270 100 L 290 220 L 110 220 Z" fill="#111827" stroke="#374151" stroke-width="2" />
  <!-- Sleeves -->
  <path d="M 130 100 L 90 190 L 110 200 L 140 140 Z" fill="#1f2937" />
  <path d="M 270 100 L 310 190 L 290 200 L 260 140 Z" fill="#1f2937" />
  <!-- Glowing stripes -->
  <path d="M 95 185 L 125 130" stroke="#ec4899" stroke-width="4" filter="url(#glow)" stroke-linecap="round" />
  <path d="M 305 185 L 275 130" stroke="#ec4899" stroke-width="4" filter="url(#glow)" stroke-linecap="round" />
  <!-- Hood -->
  <path d="M 160 100 C 160 50, 240 50, 240 100 Z" fill="#1f2937" stroke="#ec4899" stroke-width="2" />
  
  <text x="200" y="260" fill="#f472b6" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle" letter-spacing="2">CYBERWEAR HOODIE</text>
</svg>
