<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="60%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="1" />
      <stop offset="30%" stop-color="#ec4899" stop-opacity="0.8" />
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <filter id="blurFilter">
      <feGaussianBlur stdDeviation="15" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="15" fill="url(#cyberGrad)" />
  
  <!-- Glowing light effect background -->
  <circle cx="200" cy="130" r="100" fill="url(#lampGlow)" filter="url(#blurFilter)" />
  
  <!-- Lamp structure -->
  <circle cx="200" cy="130" r="45" fill="#f3e8ff" stroke="#a855f7" stroke-width="4" />
  <circle cx="200" cy="130" r="30" fill="#ffffff" />
  
  <!-- Sleek base stand -->
  <path d="M 180 175 L 220 175 L 230 210 L 170 210 Z" fill="#1f2937" stroke="#4b5563" stroke-width="2" />
  <line x1="200" y1="175" x2="200" y2="210" stroke="#a855f7" stroke-width="3" />
  
  <text x="200" y="260" fill="#c084fc" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle" letter-spacing="2">SMART AMBIENT ORB</text>
</svg>
