<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="300" rx="15" fill="url(#cyberGrad)" />
  
  <!-- Group of beautiful glowing digital vector icon badges -->
  <g transform="translate(50, 40)">
    <!-- Icon 1 -->
    <rect x="20" y="20" width="70" height="70" rx="15" fill="rgba(99, 102, 241, 0.15)" stroke="#6366f1" stroke-width="2" filter="url(#glow)" />
    <circle cx="55" cy="55" r="15" fill="none" stroke="#a5b4fc" stroke-width="3" />
    <path d="M 55 45 L 55 65 M 45 55 L 65 55" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round" />
    
    <!-- Icon 2 -->
    <rect x="110" y="20" width="70" height="70" rx="15" fill="rgba(236, 72, 153, 0.15)" stroke="#ec4899" stroke-width="2" filter="url(#glow)" />
    <path d="M 130 55 L 140 65 L 160 45" fill="none" stroke="#f472b6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Icon 3 -->
    <rect x="200" y="20" width="70" height="70" rx="15" fill="rgba(16, 185, 129, 0.15)" stroke="#10b981" stroke-width="2" filter="url(#glow)" />
    <path d="M 235 35 L 250 55 L 220 55 Z" fill="none" stroke="#34d399" stroke-width="3" />

    <!-- Icon 4 -->
    <rect x="65" y="110" width="70" height="70" rx="15" fill="rgba(14, 165, 233, 0.15)" stroke="#0ea5e9" stroke-width="2" filter="url(#glow)" />
    <rect x="85" y="130" width="30" height="30" rx="5" fill="none" stroke="#7dd3fc" stroke-width="3" />

    <!-- Icon 5 -->
    <rect x="155" y="110" width="70" height="70" rx="15" fill="rgba(245, 158, 11, 0.15)" stroke="#f59e0b" stroke-width="2" filter="url(#glow)" />
    <polygon points="190,125 195,135 205,137 197,145 199,155 190,150 181,155 183,145 175,137 185,135" fill="none" stroke="#fcd34d" stroke-width="2" />
  </g>
  
  <text x="200" y="260" fill="#38bdf8" font-family="sans-serif" font-weight="bold" font-size="14" text-anchor="middle" letter-spacing="2">500+ DYNAMIC VECTOR ICONS</text>
</svg>
